name: Azure Static Web Apps CI/CD
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      # Construimos nosotros con una version de Node compatible con Angular 22.
      # (El builder por defecto de Azure -Oryx- no ofrece aun Node >=24.15,
      # por eso compilamos aqui y luego solo subimos el resultado.)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
      - name: Install dependencies
        run: npm ci
      # Las pruebas (Vitest) corren en modo single-run; si fallan, no se despliega.
      - name: Run tests
        run: npm test -- --watch=false
      - name: Build Angular app
        run: npm run build
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_TREE_0DA071C10 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations ######
          # Ya compilamos en el paso anterior; la accion solo sube el contenido.
          app_location: "dist/eventosvivos-web/browser"
          api_location: ""
          output_location: ""
          skip_app_build: true
          skip_api_build: true
          ###### End of Repository/Build Configurations ######
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_TREE_0DA071C10 }}
          action: "close"
